<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSS Position</h1>

    <div id="parent">
        <div class="children">A</div>
        <div id="static-special" class="children">B</div>
        <div class="children">C</div>
    </div>

    <div id="parent">
        <div class="children">A</div>
        <div id="relative-special" class="children">B</div>
        <div class="children">C</div>
    </div>

    <div style="position: relative" id="parent">
        <div class="children">A</div>
        <div id="absolute-special" class="children">B</div>
        <div class="children">C</div>
    </div>
</body>
</html>

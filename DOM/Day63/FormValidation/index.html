<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Form Validation</h1>

    <form action="">
        <div id="user">
            <label for="">Username</label>
            <input type="text" placeholder="Enter Username" id="ip-user">
            <div id="user-alert"></div>
        </div>

        <div id="email">
            <label for="">Email Id:</label>
            <input type="email" placeholder="Enter email" id="ip-email">
            <div id="email-alert"></div>
        </div>

        <div id="password">
            <label for="">Password:</label>
            <input type="email" placeholder="Enter password" id="ip-pw">
            <div id="pw-alert"></div>
        </div>

    <div id="age">
        <label for="">Age:</label>
        <input type="number" placeholder="Enter age" id="ip-age">
        <div id="age-alert"></div>
        
    </div>

    <button id="btn">Submit</button>
    </form>
    
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Event - Inline</h1>
    <button onclick="clickHandler()">Click me</button>

    <script>
        function clickHandler(){
            alert("button clicked");
        }
    </script>
</body>
</html>
